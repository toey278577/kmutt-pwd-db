<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="55%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="430" cy="80" r="90" fill="white" fill-opacity="0.04"/>
  <circle cx="80" cy="430" r="70" fill="white" fill-opacity="0.03"/>

  <!-- White card behind logo -->
  <rect x="120" y="90" width="272" height="232" rx="32" fill="url(#circle)" opacity="0.97"/>

  <!-- KM -->
  <text x="256" y="220"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="100"
    letter-spacing="-2"
    fill="#ea580c">KM</text>

  <!-- UTT -->
  <text x="256" y="300"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="100"
    letter-spacing="-2"
    fill="#c2410c">UTT</text>

  <!-- Divider line -->
  <rect x="156" y="355" width="200" height="3" rx="2" fill="white" opacity="0.3"/>

  <!-- PWDs label -->
  <text x="256" y="415"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-weight="800"
    font-size="62"
    fill="white"
    letter-spacing="2">PWDs</text>

  <!-- Sub label -->
  <text x="256" y="465"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="26"
    fill="rgba(255,200,150,0.85)"
    letter-spacing="1">มจธ.</text>
</svg>
